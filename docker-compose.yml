# Hoixi — tam yığın (Hetzner / Docker Compose).
#   docker compose up -d
# Bot/dashboard iç API'si dışarı yayınlanmaz (sadece docker network). Müzik dış botta.

services:
  postgres:
    image: postgres:16-alpine
    container_name: hoixi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hoixi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hoixi}
      POSTGRES_DB: hoixi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoixi -d hoixi"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    container_name: hoixi-bot
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://hoixi:${POSTGRES_PASSWORD:-hoixi}@postgres:5432/hoixi?schema=public
      BOT_API_HOST: 0.0.0.0   # docker network'ten erişilsin (port DIŞARI açılmaz)
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3001"

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: hoixi-dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://hoixi:${POSTGRES_PASSWORD:-hoixi}@postgres:5432/hoixi?schema=public
      BOT_API_URL: http://bot:3001
    depends_on:
      postgres:
        condition: service_healthy
      bot:
        condition: service_started
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    container_name: hoixi-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dashboard

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
